{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card card-custom border-0 shadow-lg animate-fade-in">
            <div class="card-header bg-dark text-white text-center py-4">
                <i class="bi bi-shield-lock-fill fs-1 text-warning mb-2 d-inline-block"></i>
                <h3 class="brand-text m-0">Reset Password</h3>
                <p class="text-warning-emphasis mb-0 small">Password Recovery Service</p>
            </div>
            <div class="card-body p-5">
                <p class="text-muted text-center mb-4">Enter your registered email address below, and we'll send you instructions to reset your password.</p>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="form-floating mb-4">
                        <input type="email" name="email" class="form-control form-control-custom" id="id_email" placeholder="name@example.com" required>
                        <label for="id_email"><i class="bi bi-envelope me-2"></i>Email Address</label>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient-primary w-100 py-3 fs-5 mb-3">
                        <i class="bi bi-send me-2"></i>Send Reset Link
                    </button>
                    
                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" class="text-decoration-none text-secondary small"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
