{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card card-custom border-0 shadow-lg text-center animate-fade-in">
            <div class="card-body p-5">
                <i class="bi bi-shield-check text-success fs-1 mb-4 d-inline-block"></i>
                <h3 class="brand-text mb-3">Password Updated!</h3>
                <p class="text-muted mb-4">Your password has been successfully reset. You can now use your new password to sign in to your profile.</p>
                <a href="{% url 'login' %}" class="btn btn-gradient-primary w-100 py-3 fs-5">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
