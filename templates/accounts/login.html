{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card card-custom border-0 shadow-lg animate-fade-in">
            <div class="card-header bg-dark text-white text-center py-4">
                <i class="bi bi-grid-1x2-fill fs-1 text-info mb-2 d-inline-block"></i>
                <h3 class="brand-text m-0">EMS Pro</h3>
                <p class="text-info-emphasis mb-0 small">Enterprise Employee Management System</p>
            </div>
            <div class="card-body p-5">
                <h4 class="text-center mb-4 font-semibold">Sign In to Your Account</h4>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="form-floating mb-3">
                        <input type="text" name="username" class="form-control form-control-custom" id="id_username" placeholder="Username" required autofocus>
                        <label for="id_username"><i class="bi bi-person me-2"></i>Username</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" name="password" class="form-control form-control-custom" id="id_password" placeholder="Password" required>
                        <label for="id_password"><i class="bi bi-lock me-2"></i>Password</label>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient-primary w-100 py-3 fs-5 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                    
                    <div class="text-center mt-3">
                        <a href="{% url 'password_reset' %}" class="text-decoration-none text-primary small">Forgot password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
